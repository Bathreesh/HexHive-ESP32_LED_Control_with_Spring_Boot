# ============================================================
# Virtual LED Control with PWM — Application Configuration
# ============================================================

# --- Server Configuration ---
# Run application on port 80 (standard HTTP port)
server.port=80

# --- H2 In-Memory Database Configuration ---
# jdbc:h2:mem:leddb  → creates an in-memory database named 'leddb'
spring.datasource.url=jdbc:h2:mem:leddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console ---
# Access it at: http://localhost/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- JPA / Hibernate Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
